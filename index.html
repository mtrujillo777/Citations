<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Citation Chaos Arcade</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
margin:0;
}

header{
background:#0f172a;
padding:20px;
font-size:34px;
letter-spacing:2px;
}

button{
padding:14px 24px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}

button:hover{
background:#16a34a;
}

#menu{
margin-top:40px;
}

#game{
display:none;
max-width:950px;
margin:auto;
padding:20px;
}

#scoreboard{
font-size:20px;
margin-bottom:15px;
}

#timer{
color:#facc15;
}

#slot{
font-size:30px;
background:#111827;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.dropzone{
display:inline-block;
border-bottom:3px solid white;
min-width:130px;
height:30px;
margin:8px;
}

.piece{
display:inline-block;
padding:10px 14px;
margin:6px;
background:#2563eb;
border-radius:6px;
cursor:pointer;
}

#animation{
font-size:60px;
opacity:0;
transition:opacity .5s;
margin-top:20px;
}

#leaderboard{
margin-top:40px;
background:#111827;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>🎰 Citation Chaos Arcade</header>

<div id="menu">

<h2>Select Mode</h2>

<button onclick="startGame('APA')">APA Mode</button>
<button onclick="startGame('MLA')">MLA Mode</button>

</div>

<div id="game">

<div id="scoreboard">

Style: <span id="style"></span> |
Score: <span id="score">0</span> |
Time: <span id="timer">90</span>

</div>

<div id="slot">

🎰 Press SPIN to generate a citation challenge!

</div>

<button onclick="spinSlot()">SPIN</button>

<div id="citationArea"></div>

<div id="pieces"></div>

<br>

<button onclick="checkAnswer()">Check Citation</button>

<div id="animation">🎉</div>

<div id="leaderboard">

<h3>🏆 Leaderboard</h3>

<div id="scores"></div>

</div>

</div>

<audio id="spinSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-spin-1931.mp3">
</audio>

<audio id="winSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-video-game-win-2016.mp3">
</audio>

<audio id="loseSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3">
</audio>

<script>

let style="APA"
let score=0
let time=90
let currentPuzzle=null
let selectedPiece=null

let puzzles={

APA:[

{
correct:[
"Smith, J.",
"(2020).",
"The psychology of motivation.",
"Journal of Learning, 12(2),",
"45–59."
]
},

{
correct:[
"Garcia, L.",
"(2018).",
"Culture and communication.",
"Communication Review, 9(1),",
"12–28."
]
}

],

MLA:[

{
correct:[
"Smith, John.",
"\"The Psychology of Motivation.\"",
"Journal of Learning,",
"vol. 12, no. 2,",
"2020, pp. 45–59."
]
},

{
correct:[
"Garcia, Luis.",
"\"Culture and Communication.\"",
"Communication Review,",
"vol. 9, no. 1,",
"2018, pp. 12–28."
]
}

]

}

function startGame(selected){

style=selected

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("style").textContent=style

startTimer()

}

function spinSlot(){

document.getElementById("spinSound").play()

let puzzleList=puzzles[style]

currentPuzzle=puzzleList[Math.floor(Math.random()*puzzleList.length)]

let slot=document.getElementById("slot")

slot.innerHTML="🎰 Spinning..."

setTimeout(()=>{

slot.innerHTML="Citation Generated!"

buildPuzzle()

},1500)

}

function shuffle(array){

return array.sort(()=>Math.random()-0.5)

}

function buildPuzzle(){

let area=document.getElementById("citationArea")

area.innerHTML=""

let correct=currentPuzzle.correct

correct.forEach(()=>{

let zone=document.createElement("div")

zone.className="dropzone"

zone.onclick=function(){

if(selectedPiece && zone.innerHTML===""){

zone.textContent=selectedPiece

selectedPiece=null

}

}

area.appendChild(zone)

})

let piecesDiv=document.getElementById("pieces")

piecesDiv.innerHTML=""

let shuffled=shuffle([...correct])

shuffled.forEach(p=>{

let div=document.createElement("div")

div.className="piece"

div.textContent=p

div.onclick=function(){

selectedPiece=p

}

piecesDiv.appendChild(div)

})

}

function checkAnswer(){

let zones=document.querySelectorAll(".dropzone")

let answer=[]

zones.forEach(z=>answer.push(z.textContent))

if(JSON.stringify(answer)===JSON.stringify(currentPuzzle.correct)){

document.getElementById("winSound").play()

score+=10

document.getElementById("score").textContent=score

showAnimation("🎉 JACKPOT!")

spinSlot()

}else{

document.getElementById("loseSound").play()

showAnimation("❌")

}

}

function showAnimation(text){

let anim=document.getElementById("animation")

anim.innerHTML=text

anim.style.opacity=1

setTimeout(()=>{

anim.style.opacity=0

},1200)

}

function startTimer(){

let interval=setInterval(()=>{

time--

document.getElementById("timer").textContent=time

if(time<=0){

clearInterval(interval)

endGame()

}

},1000)

}

function endGame(){

showAnimation("🏁")

saveScore()

}

function saveScore(){

let scores=JSON.parse(localStorage.getItem("citationScores")||"[]")

scores.push(score)

scores.sort((a,b)=>b-a)

scores=scores.slice(0,5)

localStorage.setItem("citationScores",JSON.stringify(scores))

displayScores()

}

function displayScores(){

let scores=JSON.parse(localStorage.getItem("citationScores")||"[]")

let html=""

scores.forEach(s=>{

html+="<div>"+s+"</div>"

})

document.getElementById("scores").innerHTML=html

}

displayScores()

</script>

</body>
</html>
